# Tabular Editor CLI — PR Validation (GitHub Actions)
#
# Runs the Best Practice Analyzer against the "bad" model on every PR, across
# THREE build agents (Linux, Windows, macOS) so you can compare te CLI performance.
# Local-file BPA needs no auth — runs offline against the TMDL folder, so the three
# legs run fully in parallel (no shared workspace to clash over).
# Fails the PR check on any BPA rule of severity Error.
#
# Binaries are committed gzip'd per-OS under tools/te/ and unpacked at runtime (see
# build-release.yml header for details and the macOS arm64-vs-x64 note).
#
# To make this a required check, add it under Settings -> Branches -> Branch protection
# rules for `main` (Require status checks to pass before merging).

name: PR Validation

on:
  pull_request:
    branches:
      - main                         # change/add target branches as needed
    types: [opened, synchronize, reopened]

permissions:
  contents: read

defaults:
  run:
    shell: bash                      # bash is present on all three runners (Git Bash on Windows)

env:
  MODEL_PATH: SpacePartsBad.SemanticModel

jobs:
  bpa:
    name: "Run BPA (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false   # skip drafts; remove to validate drafts too
    strategy:
      fail-fast: false               # let every OS report, even if one fails
      matrix:                        # no max-parallel: local-file BPA has nothing to clash over
        include:
          - os: ubuntu-latest
            archive: ./tools/te/linux/te.gz
            te: ./tools/te/linux/te
          - os: windows-latest
            archive: ./tools/te/windows/te.exe.gz
            te: ./tools/te/windows/te.exe
          - os: macos-latest
            archive: ./tools/te/macos/te.gz
            te: ./tools/te/macos/te
    env:
      TE_ARCHIVE: ${{ matrix.archive }}
      TE_BINARY: ${{ matrix.te }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack te binary
        # Binaries are committed gzip'd to stay under GitHub's 100 MiB file limit.
        # gunzip ships on all three runners (Git Bash on Windows).
        run: |
          set -euo pipefail
          gunzip -c "$TE_ARCHIVE" > "$TE_BINARY"
          chmod +x "$TE_BINARY"
          "$TE_BINARY" --version

      - name: Run BPA
        # No --auth env: bpa run against a local TMDL folder does not connect to a workspace.
        # --ci github emits annotations; violations surface inline on the PR.
        # To run BPA against a deployed model instead, add an env: block with the
        # AZURE_* secrets and pass -s / -d / --auth env to the command.
        run: |
          set -euo pipefail
          "$TE_BINARY" bpa run "$MODEL_PATH" \
            --fail-on error \
            --ci github \
            --trx bpa-results.trx \
            --non-interactive

      - name: Upload BPA artifact
        uses: actions/upload-artifact@v4   # first-party GitHub action
        if: always()                       # keep results even when BPA fails
        with:
          name: bpa-results-${{ matrix.os }}
          path: bpa-results.trx
          if-no-files-found: ignore
